services:
  osxmon-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: osxmon-frontend
    ports:
      - "${FRONTEND_PORT:-3300}:3300"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
    restart: unless-stopped
